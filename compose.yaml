include:
  - oci://dockersamples/labspace-content-dev
  - ./compose.override.yaml

services:

  # Sync project files to the host so ttyd workspace can access them
  sync-service:
    image: alpine
    command: tail -f /dev/null
    volumes:
      - $HOME/.labspace/project:/project
    develop:
      watch:
        - path: ./project
          action: sync
          target: /project
          initial_sync: true
